<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0a0d0a">
<link rel="icon" type="image/svg+xml" href="{{ '/favicon.svg' | relative_url }}">
<link rel="icon" type="image/png" sizes="180x180" href="{{ '/img/avatar.png' | relative_url }}">
<link rel="apple-touch-icon" href="{{ '/img/avatar.png' | relative_url }}">
<title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
{% include meta.html %}
<style>
:root{
  --bg:#0a0d0a; --bg2:#0e120d; --panel:#11160f; --panel2:#151b12;
  --text:#dce7d6; --muted:#8aa07f; --accent:#C2F761; --accent-dim:#9fcf4a;
  --border:rgba(194,247,97,.22); --border-hi:rgba(194,247,97,.55);
  --easy:#7CF77C; --medium:#ffb43b; --hard:#ff7a3b; --insane:#ff3b5c;
  --mono:'JetBrains Mono','Fira Code','SFMono-Regular',Consolas,'Liberation Mono',monospace;
  --sans:system-ui,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:
    radial-gradient(900px 500px at 80% -10%, rgba(194,247,97,.08), transparent 60%),
    radial-gradient(700px 400px at 0% 10%, rgba(124,247,124,.05), transparent 55%), var(--bg);
  color:var(--text);font-family:var(--sans);line-height:1.65;-webkit-font-smoothing:antialiased}
a{color:var(--accent);text-decoration:none}
a:hover{color:#fff}
.wrap{max-width:1080px;margin:0 auto;padding:0 22px}

header.nav{position:sticky;top:0;z-index:50;backdrop-filter:blur(8px);
  background:rgba(10,13,10,.78);border-bottom:1px solid var(--border)}
header.nav .wrap{display:flex;align-items:center;justify-content:space-between;height:62px}
.brand{font-family:var(--mono);font-weight:700;font-size:18px;color:var(--text)}
.brand .prompt{color:var(--accent)}
.brand .caret{color:var(--accent);animation:blink 1.2s steps(1) infinite}
@keyframes blink{50%{opacity:0}}
.nav-links{display:flex;gap:24px;font-family:var(--mono);font-size:14px}
.nav-links a{color:var(--muted)}
.nav-links a:hover{color:var(--accent)}

/* hamburger menu */
.nav-toggle{display:none;background:none;border:1px solid var(--border);border-radius:9px;
  width:42px;height:42px;cursor:pointer;align-items:center;justify-content:center;
  padding:0;transition:.18s}
.nav-toggle:hover{border-color:var(--border-hi)}
.nav-toggle .bars{position:relative;width:20px;height:14px}
.nav-toggle .bars span{position:absolute;left:0;width:100%;height:2px;border-radius:2px;
  background:var(--accent);transition:.22s ease}
.nav-toggle .bars span:nth-child(1){top:0}
.nav-toggle .bars span:nth-child(2){top:6px}
.nav-toggle .bars span:nth-child(3){top:12px}
.nav-toggle[aria-expanded="true"] .bars span:nth-child(1){top:6px;transform:rotate(45deg)}
.nav-toggle[aria-expanded="true"] .bars span:nth-child(2){opacity:0}
.nav-toggle[aria-expanded="true"] .bars span:nth-child(3){top:6px;transform:rotate(-45deg)}

main{display:block}
.hero{display:grid;grid-template-columns:auto 1fr;gap:34px;align-items:center;padding:54px 0 36px}
.avatar-ring{width:148px;height:148px;border-radius:50%;padding:4px;
  background:conic-gradient(from 210deg,var(--accent),#7CF77C,var(--accent-dim),var(--accent));
  box-shadow:0 0 34px rgba(194,247,97,.25)}
.avatar-ring img{width:100%;height:100%;border-radius:50%;object-fit:cover;border:3px solid var(--bg);background:var(--panel)}
.hero h1{font-family:var(--mono);font-size:40px;line-height:1.1;letter-spacing:-.5px}
.hero h1 .accent{color:var(--accent)}
.role{font-family:var(--mono);color:var(--muted);margin-top:6px;font-size:15px}
.role .dot{color:var(--accent-dim)}
.socials{display:flex;gap:11px;margin-top:16px;flex-wrap:wrap}
.socials a{display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;
  color:var(--muted);border:1px solid var(--border);border-radius:9px;background:var(--panel);transition:.18s}
.socials a:hover{color:var(--accent);border-color:var(--border-hi);transform:translateY(-2px)}
.socials svg{width:18px;height:18px;fill:currentColor}

.bio{margin:8px 0 46px;border:1px solid var(--border);border-radius:12px;overflow:hidden;
  background:linear-gradient(180deg,var(--panel),var(--bg2))}
.bio .bar{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--border);
  background:rgba(255,255,255,.02);font-family:var(--mono);font-size:12px;color:var(--muted)}
.bio .bar .dots{display:flex;gap:6px}
.bio .bar .dots i{width:11px;height:11px;border-radius:50%;display:inline-block}
.bio .bar .dots i:nth-child(1){background:#ff5f57}.bio .bar .dots i:nth-child(2){background:#febc2e}.bio .bar .dots i:nth-child(3){background:#28c840}
.bio .body{padding:20px 22px;display:flex;gap:24px;align-items:flex-start}
.bio .txt{flex:1;min-width:0}
.bio .body p{margin-bottom:12px;color:#cbd6c4}
.bio .txt p:last-child{margin-bottom:0}
.bio .cmd{font-family:var(--mono);font-size:13px;line-height:1.6;margin-bottom:14px}
.bio .cmd .pf{color:#2777ff;font-weight:700}
.bio .cmd .uh{color:#fff;font-weight:700}
.bio .cmd .path{color:#fff;font-weight:700}
.bio .cmd .run{color:var(--accent)}
.bio figure{flex:0 0 220px;max-width:220px}
.bio figure img{width:100%;border-radius:10px;border:1px solid var(--border-hi);display:block;box-shadow:0 0 22px rgba(194,247,97,.12)}
.bio figure img+img{margin-top:12px}
.bio figcaption{font-family:var(--mono);font-size:11px;color:var(--muted);text-align:center;margin-top:7px}

.sec-head{display:flex;align-items:center;gap:14px;margin:10px 0 22px}
.sec-head h2{font-family:var(--mono);font-size:24px;color:var(--text)}
.sec-head h2 .hash{color:var(--accent)}
.sec-head .line{flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}
.sec-head .more{font-family:var(--mono);font-size:13px;color:var(--accent)}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:18px}
.card{position:relative;border:1px solid var(--border);border-radius:13px;padding:20px;min-width:0;
  background:linear-gradient(180deg,var(--panel),var(--bg2));transition:.2s;display:flex;flex-direction:column}
.card:hover{border-color:var(--border-hi);transform:translateY(-3px);box-shadow:0 12px 30px rgba(0,0,0,.4),0 0 0 1px var(--border-hi)}
.card .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.card h3{font-family:var(--mono);font-size:19px;color:var(--text)}
.badge{font-family:var(--mono);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;
  padding:3px 9px;border-radius:20px;border:1px solid currentColor}
.badge.easy{color:var(--easy)}.badge.medium{color:var(--medium)}.badge.hard{color:var(--hard)}.badge.insane{color:var(--insane)}.badge.soon{color:var(--muted)}
.card p{color:var(--muted);font-size:13.5px;flex:1;margin-bottom:16px}
.card .go{font-family:var(--mono);font-size:13px;color:var(--accent);font-weight:600}
.card.coming{opacity:.6}.card.coming:hover{transform:none;box-shadow:none;border-color:var(--border)}
.tags{font-family:var(--mono);font-size:11px;color:var(--accent-dim);margin-bottom:12px;overflow-wrap:break-word}
.card .date{font-family:var(--mono);font-size:11px;color:var(--muted);margin:-4px 0 12px}

/* blog post preview cards */
.posts{display:flex;flex-direction:column;gap:14px}
.post-card{border:1px solid var(--border);border-radius:13px;padding:18px 22px;
  background:linear-gradient(180deg,var(--panel),var(--bg2));transition:.2s;display:block}
.post-card:hover{border-color:var(--border-hi);transform:translateX(3px)}
.post-card .date{font-family:var(--mono);font-size:12px;color:var(--accent-dim);text-align:left;line-height:1.3}
.post-card .ptags{font-family:var(--mono);color:var(--accent-dim);font-size:clamp(9px,2.7vw,12px);text-align:center;margin-top:5px;line-height:1.3;overflow-wrap:break-word}
.post-card h3{color:var(--text);margin:5px 0 8px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:clamp(12px,3.6vw,20px);line-height:1.25}
.post-card:hover h3{color:var(--accent)}
.post-card p{color:var(--muted);font-size:14px;margin-bottom:9px}
.post-card .tags{margin-bottom:0}
.empty{border:1px dashed var(--border);border-radius:12px;padding:26px;text-align:center;color:var(--muted);font-family:var(--mono);font-size:13px}

.htb{display:flex;align-items:center;gap:22px;flex-wrap:wrap;margin:42px 0 10px;
  border:1px solid var(--border);border-radius:13px;padding:22px 24px;background:linear-gradient(180deg,var(--panel),var(--bg2))}
.htb img{height:54px}
.htb .txt{flex:1;min-width:200px}
.htb .txt b{color:var(--accent);font-family:var(--mono)}
.htb .txt p{color:var(--muted);font-size:13.5px;margin-top:3px}
.htb .go{font-family:var(--mono);border:1px solid var(--border-hi);border-radius:8px;padding:9px 16px}

.affil{margin:42px 0 0}
.affil .row{display:flex;gap:48px;align-items:center;justify-content:center;flex-wrap:wrap;
  border:1px solid var(--border);border-radius:13px;padding:26px 24px;background:linear-gradient(180deg,var(--panel),var(--bg2))}
.affil img{height:80px;filter:drop-shadow(0 0 12px rgba(194,247,97,.16));transition:.2s}
.affil img:hover{transform:scale(1.05);filter:drop-shadow(0 0 16px rgba(194,247,97,.32))}

/* article body (blog posts + write-ups) */
.article{max-width:760px;margin:34px auto 0}
.article .post-meta{font-family:var(--mono);font-size:13px;color:var(--accent-dim);margin-bottom:6px}
.article>h1:first-of-type,.article .post-title{font-family:var(--mono);font-size:32px;color:var(--text);margin:0 0 18px;line-height:1.2}
.article .post-title:has(+ .post-subtitle){margin-bottom:8px}
.article .post-subtitle{font-family:var(--mono);font-weight:400;font-size:19px;color:var(--muted);margin:0 0 22px;line-height:1.3}
.post-share{margin:36px 0 4px;border-top:1px solid var(--border);padding-top:22px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.view-count{font-family:var(--mono);font-size:13px;color:var(--muted)}
.share-btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;font-family:var(--mono);font-size:14px;color:var(--muted);
  background:var(--panel);border:1px solid var(--border);border-radius:9px;padding:13px 20px;min-height:48px;cursor:pointer;transition:.18s}
.share-btn:hover{color:var(--accent);border-color:var(--border-hi);transform:translateY(-1px)}
.share-btn.copied{color:var(--accent);border-color:var(--border-hi)}
.share-btn svg{width:16px;height:16px;fill:currentColor}
.article h1{font-family:var(--mono);font-size:28px;color:var(--text);margin:30px 0 14px}
.article h2{font-family:var(--mono);font-size:22px;color:var(--accent);margin:30px 0 12px;border-bottom:1px solid var(--border);padding-bottom:6px}
.article h3{font-family:var(--mono);font-size:18px;color:var(--text);margin:24px 0 10px}
.article p{margin:0 0 15px}
.article ul,.article ol{margin:0 0 15px 22px}.article li{margin:5px 0}
.article a{color:var(--accent);text-decoration:underline;text-underline-offset:3px}
.article code{font-family:var(--mono);font-size:13px;background:rgba(194,247,97,.09);color:var(--accent);padding:2px 6px;border-radius:5px}
.article pre{background:#070b07;border:1px solid var(--border);border-radius:9px;padding:14px 16px;overflow:auto;margin:0 0 16px}
.article pre code{background:none;color:#cfe3d0;padding:0;font-size:12.5px;line-height:1.6}
.article blockquote{border-left:3px solid var(--accent-dim);margin:0 0 16px;padding:6px 16px;color:var(--muted);background:rgba(255,255,255,.02)}
.article img{max-width:100%;height:auto;border-radius:8px;border:1px solid var(--border);margin:10px 0;display:block}
.article hr{border:none;border-top:1px solid var(--border);margin:28px 0}
.article table{border-collapse:collapse;margin:0 0 16px;width:100%;font-size:14px}
.article th,.article td{border:1px solid var(--border);padding:8px 12px;text-align:left;vertical-align:top}
.article th{color:var(--accent);font-family:var(--mono)}
.article .crumb{font-family:var(--mono);font-size:13px;color:var(--muted);margin-bottom:18px}

footer{border-top:1px solid var(--border);margin-top:48px;padding:26px 0;font-family:var(--mono);font-size:12.5px;color:var(--muted);text-align:center}
footer .accent{color:var(--accent-dim)}
.gc-exclude{color:var(--muted);opacity:.5;cursor:pointer}.gc-exclude:hover{opacity:1;color:var(--accent)}

@media(max-width:820px){
  .nav-toggle{display:inline-flex}
  .nav-links{position:absolute;top:62px;right:22px;flex-direction:column;gap:0;
    min-width:184px;padding:6px;border:1px solid var(--border-hi);border-radius:11px;
    background:rgba(10,13,10,.97);backdrop-filter:blur(10px);
    box-shadow:0 14px 34px rgba(0,0,0,.5);
    opacity:0;visibility:hidden;transform:translateY(-6px);transition:.18s ease}
  .nav-links.open{opacity:1;visibility:visible;transform:translateY(0)}
  .nav-links a{padding:11px 14px;border-radius:7px;color:var(--text)}
  .nav-links a:hover{background:rgba(194,247,97,.09);color:var(--accent)}
}
@media(max-width:680px){
  .hero{grid-template-columns:1fr;text-align:center;justify-items:center;padding:34px 0 24px}
  .hero h1{font-size:32px}
  .bio .body{flex-direction:column}.bio figure{flex-basis:auto;max-width:100%}
}
</style>
</head>
<body>
<header class="nav"><div class="wrap">
  <a class="brand" href="{{ '/' | relative_url }}"><span class="prompt">⛰</span> iceberg-deep<span class="caret">_</span></a>
  <button class="nav-toggle" id="navToggle" aria-label="Menu" aria-controls="navMenu" aria-expanded="false">
    <span class="bars"><span></span><span></span><span></span></span>
  </button>
  <nav class="nav-links" id="navMenu">
    <a href="{{ '/' | relative_url }}">Home</a>
    <a href="{{ '/blog/' | relative_url }}">Blog</a>
    <a href="{{ '/writeups/' | relative_url }}">Write-ups</a>
    <a href="{{ '/#about' | relative_url }}">About</a>
    <a href="https://github.com/iceberg-deep">GitHub</a>
  </nav>
</div></header>

<main><div class="wrap">
{{ content }}
</div></main>

<footer><span class="accent">Iceberg-Deep</span> © 2026 · <a href="https://github.com/iceberg-deep/blog">source</a>{% if site.goatcounter and site.goatcounter != "" %} · <a href="#" id="gc-exclude" class="gc-exclude" title="Toggle analytics counting for this device only">exclude this device</a>{% endif %}</footer>
<script>
(function(){
  var btn=document.getElementById('navToggle'),menu=document.getElementById('navMenu');
  if(!btn||!menu)return;
  function close(){menu.classList.remove('open');btn.setAttribute('aria-expanded','false');}
  btn.addEventListener('click',function(e){
    e.stopPropagation();
    var open=menu.classList.toggle('open');
    btn.setAttribute('aria-expanded',open?'true':'false');
  });
  menu.addEventListener('click',function(e){if(e.target.tagName==='A')close();});
  document.addEventListener('click',function(e){
    if(menu.classList.contains('open')&&!menu.contains(e.target)&&!btn.contains(e.target))close();
  });
  document.addEventListener('keydown',function(e){if(e.key==='Escape')close();});
})();
</script>
{% include analytics.html %}
</body>
</html>
