---
layout: default
---
<article class="article">
  <div class="crumb"><a href="{{ '/' | relative_url }}">← home</a> / write-ups</div>
  {% if page.date %}<div class="post-meta">{{ page.date | date: "%B %-d, %Y" }}</div>{% endif %}
  {{ content }}

  <div class="post-share">
    <button class="share-btn" type="button" data-url="{{ page.url | absolute_url }}" data-title="{{ page.title | escape }}" aria-label="Share this write-up">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.94-2.92z"/></svg>
      <span>Share</span>
    </button>
    {% if site.goatcounter and site.goatcounter != "" %}<span class="view-count" id="gc-views" aria-live="polite"></span>{% endif %}
  </div>
</article>
<script>
(function(){
  var btn = document.querySelector('.share-btn');
  if (!btn) return;
  var label = btn.querySelector('span');
  btn.addEventListener('click', async function(){
    var url = btn.dataset.url, title = btn.dataset.title;
    if (navigator.share) {
      try { await navigator.share({ title: title, url: url }); } catch (e) {}
      return;
    }
    try {
      await navigator.clipboard.writeText(url);
      var prev = label.textContent;
      label.textContent = 'Link copied';
      btn.classList.add('copied');
      setTimeout(function(){ label.textContent = prev; btn.classList.remove('copied'); }, 1800);
    } catch (e) {
      window.prompt('Copy this link:', url);
    }
  });
})();
</script>
