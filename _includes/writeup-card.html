<a class="card" href="{{ include.wu.url | relative_url }}">
      <div class="top"><h3>{{ include.wu.box }}</h3><span class="badge {{ include.wu.difficulty | downcase }}">{{ include.wu.difficulty }}</span></div>
      <div class="tags">{{ include.wu.tags }}</div>
      <div class="date">{{ include.wu.date | date: "%b %-d, %Y" }}</div>
      <p>{{ include.wu.blurb }}</p>
      <span class="go">Read write-up →</span>
    </a>
