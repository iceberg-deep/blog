# Write-up index — drives the #writeups grid on the home page (latest 6)
# and the full /writeups/ archive page. Add a new entry per write-up;
# it appears in both places automatically, sorted by date (newest first).
# difficulty must be one of: easy | medium | hard | insane  (badge colour)
#
# STAGING active boxes (hide until retirement):
#   - add  hidden: true  to an entry  ->  its card is pulled from the home page
#     and the /writeups/ archive, and it drops out of search. Metadata only.
#   - keep the write-up PAGE in _drafts/ (Jekyll never builds _drafts/), so no
#     public URL exists while the box is still active. For strict compliance,
#     push that draft only to the private 'staging' remote, never to public.
#   - RELEASE when the box retires: move the page into _posts/ dated retire+7,
#     then delete the  hidden: true  line (or set hidden: false) and push.

